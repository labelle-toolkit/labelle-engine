name: CI - Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sibling dependencies
        run: |
          git clone --depth 1 https://github.com/labelle-toolkit/labelle-core.git ../labelle-core

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-cache-${{ runner.os }}-${{ hashFiles('**/build.zig.zon') }}
          restore-keys: |
            zig-cache-${{ runner.os }}-

      - name: Build library
        run: zig build

      - name: Run tests
        shell: bash
        run: |
          set +e
          zig build test --summary all 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Create summary
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit $TEST_EXIT_CODE
