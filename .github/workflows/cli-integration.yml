name: CI - CLI Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cli-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout labelle-engine
        uses: actions/checkout@v4
        with:
          path: labelle-engine

      - name: Checkout sibling dependencies
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-core
          path: labelle-core

      - uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-gfx
          path: labelle-gfx

      - uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-cli
          path: labelle-cli

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxext-dev libxfixes-dev \
            libwayland-dev libxkbcommon-dev libasound2-dev

      - name: Install labelle-cli
        run: |
          cd labelle-cli
          zig build install --prefix $HOME/.labelle
          echo "$HOME/.labelle/bin" >> $GITHUB_PATH

      - name: Verify CLI
        run: labelle version

      - name: Create and generate project
        run: |
          mkdir -p test-projects && cd test-projects
          labelle init test_game --backend=raylib --ecs=zig_ecs \
            --core-version="local:../../labelle-core" \
            --engine-version="local:../../labelle-engine" \
            --gfx-version="local:../../labelle-gfx" \
            --labelle-version="local:../../labelle-cli"
          cd test_game
          labelle generate
          ls -la .labelle/raylib_desktop/

      - name: Build project
        run: |
          cd test-projects/test_game/.labelle/raylib_desktop
          zig build
